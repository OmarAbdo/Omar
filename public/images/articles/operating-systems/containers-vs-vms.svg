<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480" font-family="Arial, sans-serif">
  <rect width="800" height="480" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold">Containers vs Virtual Machines</text>
  <text x="400" y="52" text-anchor="middle" fill="#8b949e" font-size="12">Containers share the host kernel. VMs each run their own OS.</text>

  <!-- Divider line -->
  <line x1="400" y1="70" x2="400" y2="420" stroke="#8b949e" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- =============== LEFT: Virtual Machines =============== -->
  <text x="200" y="80" text-anchor="middle" fill="#C9B896" font-size="15" font-weight="bold">Virtual Machines</text>

  <!-- Hardware layer -->
  <rect x="40" y="380" width="320" height="38" rx="4" fill="#161b22" stroke="#8b949e" stroke-width="1.5"/>
  <text x="200" y="404" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="bold">Hardware</text>

  <!-- Host OS -->
  <rect x="40" y="334" width="320" height="38" rx="4" fill="#161b22" stroke="#C9B896" stroke-width="1.5"/>
  <text x="200" y="358" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="bold">Host OS</text>

  <!-- Hypervisor -->
  <rect x="40" y="288" width="320" height="38" rx="4" fill="#388bfd20" stroke="#388bfd" stroke-width="1.5"/>
  <text x="200" y="312" text-anchor="middle" fill="#388bfd" font-size="12" font-weight="bold">Hypervisor</text>

  <!-- VM 1 -->
  <rect x="50" y="110" width="90" height="168" rx="4" fill="none" stroke="#C9B896" stroke-width="1.5"/>
  <!-- Guest OS -->
  <rect x="54" y="214" width="82" height="56" rx="3" fill="#C9B89615" stroke="#C9B896" stroke-width="1"/>
  <text x="95" y="237" text-anchor="middle" fill="#C9B896" font-size="9" font-weight="bold">Guest</text>
  <text x="95" y="250" text-anchor="middle" fill="#C9B896" font-size="9" font-weight="bold">OS</text>
  <text x="95" y="264" text-anchor="middle" fill="#8b949e" font-size="8">Linux</text>
  <!-- Bins/Libs -->
  <rect x="54" y="162" width="82" height="44" rx="3" fill="#161b22" stroke="#8b949e" stroke-width="0.8"/>
  <text x="95" y="182" text-anchor="middle" fill="#8b949e" font-size="9">Bins/Libs</text>
  <!-- App -->
  <rect x="54" y="116" width="82" height="38" rx="3" fill="#388bfd20" stroke="#388bfd" stroke-width="1"/>
  <text x="95" y="140" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="bold">App 1</text>

  <!-- VM 2 -->
  <rect x="155" y="110" width="90" height="168" rx="4" fill="none" stroke="#C9B896" stroke-width="1.5"/>
  <rect x="159" y="214" width="82" height="56" rx="3" fill="#C9B89615" stroke="#C9B896" stroke-width="1"/>
  <text x="200" y="237" text-anchor="middle" fill="#C9B896" font-size="9" font-weight="bold">Guest</text>
  <text x="200" y="250" text-anchor="middle" fill="#C9B896" font-size="9" font-weight="bold">OS</text>
  <text x="200" y="264" text-anchor="middle" fill="#8b949e" font-size="8">Windows</text>
  <rect x="159" y="162" width="82" height="44" rx="3" fill="#161b22" stroke="#8b949e" stroke-width="0.8"/>
  <text x="200" y="182" text-anchor="middle" fill="#8b949e" font-size="9">Bins/Libs</text>
  <rect x="159" y="116" width="82" height="38" rx="3" fill="#388bfd20" stroke="#388bfd" stroke-width="1"/>
  <text x="200" y="140" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="bold">App 2</text>

  <!-- VM 3 -->
  <rect x="260" y="110" width="90" height="168" rx="4" fill="none" stroke="#C9B896" stroke-width="1.5"/>
  <rect x="264" y="214" width="82" height="56" rx="3" fill="#C9B89615" stroke="#C9B896" stroke-width="1"/>
  <text x="305" y="237" text-anchor="middle" fill="#C9B896" font-size="9" font-weight="bold">Guest</text>
  <text x="305" y="250" text-anchor="middle" fill="#C9B896" font-size="9" font-weight="bold">OS</text>
  <text x="305" y="264" text-anchor="middle" fill="#8b949e" font-size="8">Linux</text>
  <rect x="264" y="162" width="82" height="44" rx="3" fill="#161b22" stroke="#8b949e" stroke-width="0.8"/>
  <text x="305" y="182" text-anchor="middle" fill="#8b949e" font-size="9">Bins/Libs</text>
  <rect x="264" y="116" width="82" height="38" rx="3" fill="#388bfd20" stroke="#388bfd" stroke-width="1"/>
  <text x="305" y="140" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="bold">App 3</text>

  <!-- =============== RIGHT: Containers =============== -->
  <text x="600" y="80" text-anchor="middle" fill="#C9B896" font-size="15" font-weight="bold">Containers</text>

  <!-- Hardware layer -->
  <rect x="440" y="380" width="320" height="38" rx="4" fill="#161b22" stroke="#8b949e" stroke-width="1.5"/>
  <text x="600" y="404" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="bold">Hardware</text>

  <!-- Host OS -->
  <rect x="440" y="334" width="320" height="38" rx="4" fill="#161b22" stroke="#C9B896" stroke-width="1.5"/>
  <text x="600" y="358" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="bold">Host OS</text>

  <!-- Container Runtime -->
  <rect x="440" y="288" width="320" height="38" rx="4" fill="#C9B89620" stroke="#C9B896" stroke-width="1.5"/>
  <text x="600" y="312" text-anchor="middle" fill="#C9B896" font-size="12" font-weight="bold">Container Runtime (Docker)</text>

  <!-- Container 1 -->
  <rect x="450" y="168" width="90" height="110" rx="4" fill="none" stroke="#C9B896" stroke-width="1.5"/>
  <!-- No Guest OS! Dashed outline where it would be -->
  <rect x="454" y="214" width="82" height="56" rx="3" fill="none" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="495" y="242" text-anchor="middle" fill="#8b949e" font-size="9" font-style="italic">No Guest OS</text>
  <!-- Bins/Libs -->
  <rect x="454" y="174" width="82" height="32" rx="3" fill="#161b22" stroke="#8b949e" stroke-width="0.8"/>
  <text x="495" y="194" text-anchor="middle" fill="#8b949e" font-size="9">Bins/Libs</text>
  <!-- App -->
  <rect x="454" y="116" width="82" height="46" rx="3" fill="#C9B89620" stroke="#C9B896" stroke-width="1"/>
  <text x="495" y="144" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="bold">App 1</text>

  <!-- Container 2 -->
  <rect x="555" y="168" width="90" height="110" rx="4" fill="none" stroke="#C9B896" stroke-width="1.5"/>
  <rect x="559" y="214" width="82" height="56" rx="3" fill="none" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="600" y="242" text-anchor="middle" fill="#8b949e" font-size="9" font-style="italic">No Guest OS</text>
  <rect x="559" y="174" width="82" height="32" rx="3" fill="#161b22" stroke="#8b949e" stroke-width="0.8"/>
  <text x="600" y="194" text-anchor="middle" fill="#8b949e" font-size="9">Bins/Libs</text>
  <rect x="559" y="116" width="82" height="46" rx="3" fill="#C9B89620" stroke="#C9B896" stroke-width="1"/>
  <text x="600" y="144" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="bold">App 2</text>

  <!-- Container 3 -->
  <rect x="660" y="168" width="90" height="110" rx="4" fill="none" stroke="#C9B896" stroke-width="1.5"/>
  <rect x="664" y="214" width="82" height="56" rx="3" fill="none" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="705" y="242" text-anchor="middle" fill="#8b949e" font-size="9" font-style="italic">No Guest OS</text>
  <rect x="664" y="174" width="82" height="32" rx="3" fill="#161b22" stroke="#8b949e" stroke-width="0.8"/>
  <text x="705" y="194" text-anchor="middle" fill="#8b949e" font-size="9">Bins/Libs</text>
  <rect x="664" y="116" width="82" height="46" rx="3" fill="#C9B89620" stroke="#C9B896" stroke-width="1"/>
  <text x="705" y="144" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="bold">App 3</text>

  <!-- Height comparison annotations -->
  <!-- VM stack height bracket -->
  <line x1="28" y1="110" x2="28" y2="418" stroke="#8b949e" stroke-width="1"/>
  <line x1="24" y1="110" x2="32" y2="110" stroke="#8b949e" stroke-width="1"/>
  <line x1="24" y1="418" x2="32" y2="418" stroke="#8b949e" stroke-width="1"/>
  <text x="20" y="268" text-anchor="middle" fill="#8b949e" font-size="9" transform="rotate(-90, 20, 268)">Heavy</text>

  <!-- Container stack height bracket -->
  <line x1="772" y1="116" x2="772" y2="418" stroke="#C9B896" stroke-width="1"/>
  <line x1="768" y1="116" x2="776" y2="116" stroke="#C9B896" stroke-width="1"/>
  <line x1="768" y1="418" x2="776" y2="418" stroke="#C9B896" stroke-width="1"/>
  <text x="780" y="268" text-anchor="middle" fill="#C9B896" font-size="9" transform="rotate(-90, 784, 268)">Lightweight</text>

  <!-- Bottom comparison -->
  <text x="200" y="448" text-anchor="middle" fill="#8b949e" font-size="11">Minutes to boot | GBs of overhead</text>
  <text x="600" y="448" text-anchor="middle" fill="#C9B896" font-size="11">Seconds to start | MBs of overhead</text>
</svg>