<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 220" font-family="ui-sans-serif, system-ui, sans-serif" role="img" aria-label="Raft time is divided into numbered terms. Each term begins with an election. Some terms elect a leader and continue as normal operation; other terms have a split vote and end with no leader, moving straight to the next term.">
  <defs>
    <style>
      .axis{stroke:#9aa0aa;stroke-width:1.5;}
      .elect{fill:#d4a24e;opacity:0.85;}
      .normal{fill:#cfe3d6;stroke:#79b18c;}
      .split{fill:#f0d3d3;stroke:#c98a8a;}
      .t{fill:#1a1c22;}
      .m{fill:#6b7280;}
      @media (prefers-color-scheme: dark){
        .normal{fill:#12251a;stroke:#2f6b47;}
        .split{fill:#2a1414;stroke:#7a3b3b;}
        .t{fill:#e8e8ea;}
        .m{fill:#9aa0aa;}
      }
    </style>
  </defs>

  <!-- term 1: election + normal -->
  <rect class="elect" x="30" y="70" width="22" height="60" rx="3"/>
  <rect class="normal" x="52" y="70" width="150" height="60" rx="3"/>
  <text class="t" x="127" y="105" font-size="12" font-weight="700" text-anchor="middle">Term 1</text>

  <!-- term 2: election + normal -->
  <rect class="elect" x="212" y="70" width="22" height="60" rx="3"/>
  <rect class="normal" x="234" y="70" width="120" height="60" rx="3"/>
  <text class="t" x="294" y="105" font-size="12" font-weight="700" text-anchor="middle">Term 2</text>

  <!-- term 3: split vote, no leader -->
  <rect class="elect" x="364" y="70" width="22" height="60" rx="3"/>
  <rect class="split" x="386" y="70" width="60" height="60" rx="3"/>
  <text class="t" x="416" y="100" font-size="11" font-weight="700" text-anchor="middle">Term 3</text>
  <text class="m" x="416" y="150" font-size="9" text-anchor="middle">split vote</text>
  <text class="m" x="416" y="161" font-size="9" text-anchor="middle">(no leader)</text>

  <!-- term 4: election + normal -->
  <rect class="elect" x="456" y="70" width="22" height="60" rx="3"/>
  <rect class="normal" x="478" y="70" width="160" height="60" rx="3"/>
  <text class="t" x="558" y="105" font-size="12" font-weight="700" text-anchor="middle">Term 4</text>

  <!-- axis -->
  <line class="axis" x1="20" y1="150" x2="700" y2="150"/>
  <path d="M700 150 l-9 -4.5 l0 9 z" fill="#9aa0aa"/>
  <text class="m" x="700" y="172" font-size="11" text-anchor="end">time →</text>

  <!-- legend -->
  <rect class="elect" x="30" y="188" width="14" height="14" rx="2"/>
  <text class="m" x="50" y="200" font-size="11">election</text>
  <rect class="normal" x="130" y="188" width="14" height="14" rx="2"/>
  <text class="m" x="150" y="200" font-size="11">normal operation (one leader)</text>
  <rect class="split" x="400" y="188" width="14" height="14" rx="2"/>
  <text class="m" x="420" y="200" font-size="11">term with no elected leader</text>

  <text class="m" x="30" y="45" font-size="12" font-weight="600">Terms act as a logical clock — each is a monotonically increasing integer</text>
</svg>
