<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" font-family="Arial, sans-serif">
  <rect width="800" height="420" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold">The Universal Pipeline Pattern</text>
  <text x="400" y="52" text-anchor="middle" fill="#8b949e" font-size="12">Input &#8594; Stages &#8594; Output</text>

  <defs>
    <marker id="pipeArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C9B896"/>
    </marker>
  </defs>

  <!-- ============= ROW 1: CI/CD ============= -->
  <text x="60" y="110" text-anchor="start" fill="#388bfd" font-size="13" font-weight="bold">CI/CD</text>

  <!-- Code -->
  <rect x="130" y="90" width="100" height="38" rx="6" fill="#161b22" stroke="#C9B896" stroke-width="1.5"/>
  <text x="180" y="114" text-anchor="middle" fill="#e6edf3" font-size="12">Code</text>
  <!-- Arrow -->
  <line x1="230" y1="109" x2="265" y2="109" stroke="#C9B896" stroke-width="1.5" marker-end="url(#pipeArrow)"/>
  <!-- Build -->
  <rect x="270" y="90" width="100" height="38" rx="6" fill="#161b22" stroke="#C9B896" stroke-width="1.5"/>
  <text x="320" y="114" text-anchor="middle" fill="#e6edf3" font-size="12">Build</text>
  <!-- Arrow -->
  <line x1="370" y1="109" x2="405" y2="109" stroke="#C9B896" stroke-width="1.5" marker-end="url(#pipeArrow)"/>
  <!-- Test -->
  <rect x="410" y="90" width="100" height="38" rx="6" fill="#161b22" stroke="#C9B896" stroke-width="1.5"/>
  <text x="460" y="114" text-anchor="middle" fill="#e6edf3" font-size="12">Test</text>
  <!-- Arrow -->
  <line x1="510" y1="109" x2="545" y2="109" stroke="#C9B896" stroke-width="1.5" marker-end="url(#pipeArrow)"/>
  <!-- Deploy -->
  <rect x="550" y="90" width="100" height="38" rx="6" fill="#161b22" stroke="#C9B896" stroke-width="1.5"/>
  <text x="600" y="114" text-anchor="middle" fill="#e6edf3" font-size="12">Deploy</text>

  <!-- ============= ROW 2: Data ============= -->
  <text x="60" y="200" text-anchor="start" fill="#388bfd" font-size="13" font-weight="bold">Data</text>

  <!-- Extract -->
  <rect x="130" y="180" width="120" height="38" rx="6" fill="#161b22" stroke="#C9B896" stroke-width="1.5"/>
  <text x="190" y="204" text-anchor="middle" fill="#e6edf3" font-size="12">Extract</text>
  <!-- Arrow -->
  <line x1="250" y1="199" x2="295" y2="199" stroke="#C9B896" stroke-width="1.5" marker-end="url(#pipeArrow)"/>
  <!-- Transform -->
  <rect x="300" y="180" width="120" height="38" rx="6" fill="#161b22" stroke="#C9B896" stroke-width="1.5"/>
  <text x="360" y="204" text-anchor="middle" fill="#e6edf3" font-size="12">Transform</text>
  <!-- Arrow -->
  <line x1="420" y1="199" x2="465" y2="199" stroke="#C9B896" stroke-width="1.5" marker-end="url(#pipeArrow)"/>
  <!-- Load -->
  <rect x="470" y="180" width="120" height="38" rx="6" fill="#161b22" stroke="#C9B896" stroke-width="1.5"/>
  <text x="530" y="204" text-anchor="middle" fill="#e6edf3" font-size="12">Load</text>

  <!-- ============= ROW 3: ML ============= -->
  <text x="60" y="296" text-anchor="start" fill="#388bfd" font-size="13" font-weight="bold">ML</text>

  <!-- Data -->
  <rect x="110" y="276" width="85" height="38" rx="6" fill="#161b22" stroke="#C9B896" stroke-width="1.5"/>
  <text x="152" y="300" text-anchor="middle" fill="#e6edf3" font-size="12">Data</text>
  <!-- Arrow -->
  <line x1="195" y1="295" x2="220" y2="295" stroke="#C9B896" stroke-width="1.5" marker-end="url(#pipeArrow)"/>
  <!-- Preprocess -->
  <rect x="225" y="276" width="100" height="38" rx="6" fill="#161b22" stroke="#C9B896" stroke-width="1.5"/>
  <text x="275" y="300" text-anchor="middle" fill="#e6edf3" font-size="11">Preprocess</text>
  <!-- Arrow -->
  <line x1="325" y1="295" x2="350" y2="295" stroke="#C9B896" stroke-width="1.5" marker-end="url(#pipeArrow)"/>
  <!-- Train -->
  <rect x="355" y="276" width="85" height="38" rx="6" fill="#161b22" stroke="#C9B896" stroke-width="1.5"/>
  <text x="397" y="300" text-anchor="middle" fill="#e6edf3" font-size="12">Train</text>
  <!-- Arrow -->
  <line x1="440" y1="295" x2="465" y2="295" stroke="#C9B896" stroke-width="1.5" marker-end="url(#pipeArrow)"/>
  <!-- Evaluate -->
  <rect x="470" y="276" width="95" height="38" rx="6" fill="#161b22" stroke="#C9B896" stroke-width="1.5"/>
  <text x="517" y="300" text-anchor="middle" fill="#e6edf3" font-size="12">Evaluate</text>
  <!-- Arrow -->
  <line x1="565" y1="295" x2="590" y2="295" stroke="#C9B896" stroke-width="1.5" marker-end="url(#pipeArrow)"/>
  <!-- Deploy -->
  <rect x="595" y="276" width="85" height="38" rx="6" fill="#161b22" stroke="#C9B896" stroke-width="1.5"/>
  <text x="637" y="300" text-anchor="middle" fill="#e6edf3" font-size="12">Deploy</text>

  <!-- Right bracket: "Same Pattern" -->
  <path d="M710 85 L725 85 L725 310 L710 310" fill="none" stroke="#C9B896" stroke-width="1.5"/>
  <line x1="725" y1="197" x2="735" y2="197" stroke="#C9B896" stroke-width="1.5"/>
  <text x="745" y="190" text-anchor="start" fill="#C9B896" font-size="11" font-weight="bold">Same</text>
  <text x="745" y="206" text-anchor="start" fill="#C9B896" font-size="11" font-weight="bold">Pattern</text>

  <!-- Bottom explanation -->
  <line x1="60" y1="350" x2="700" y2="350" stroke="#8b949e" stroke-width="0.5" stroke-dasharray="4,4"/>
  <text x="400" y="378" text-anchor="middle" fill="#e6edf3" font-size="12">Every pipeline transforms input through sequential stages to produce output.</text>
  <text x="400" y="398" text-anchor="middle" fill="#8b949e" font-size="11">Each stage is independent, testable, and replaceable.</text>
</svg>