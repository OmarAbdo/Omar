<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440" font-family="Arial, sans-serif">
  <rect width="800" height="440" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold">Dijkstra's Algorithm: Shortest Path A to F</text>

  <defs>
    <marker id="arrW" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e"/>
    </marker>
  </defs>

  <!-- Graph layout (hexagonal):
       B(300,100)     C(500,100)
    A(150,220)                   F(650,220)
       D(300,340)     E(500,340)
  -->

  <!-- === EDGES (non-path edges first, in gray) === -->
  <!-- A-D: 7 -->
  <line x1="170" y1="238" x2="280" y2="325" stroke="#8b949e" stroke-width="1.2"/>
  <text x="210" y="290" text-anchor="middle" fill="#8b949e" font-size="12">7</text>

  <!-- B-C: 3 -->
  <line x1="325" y1="100" x2="475" y2="100" stroke="#8b949e" stroke-width="1.2"/>
  <text x="400" y="93" text-anchor="middle" fill="#8b949e" font-size="12">3</text>

  <!-- B-D: 5 -->
  <line x1="300" y1="125" x2="300" y2="315" stroke="#8b949e" stroke-width="1.2"/>
  <text x="288" y="220" text-anchor="middle" fill="#8b949e" font-size="12">5</text>

  <!-- C-E: 6 -->
  <line x1="500" y1="125" x2="500" y2="315" stroke="#8b949e" stroke-width="1.2"/>
  <text x="512" y="220" text-anchor="middle" fill="#8b949e" font-size="12">6</text>

  <!-- D-E: 4 -->
  <line x1="325" y1="340" x2="475" y2="340" stroke="#8b949e" stroke-width="1.2"/>
  <text x="400" y="358" text-anchor="middle" fill="#8b949e" font-size="12">4</text>

  <!-- D-F: 8 -->
  <line x1="320" y1="328" x2="630" y2="232" stroke="#8b949e" stroke-width="1.2"/>
  <text x="480" y="296" text-anchor="middle" fill="#8b949e" font-size="12">8</text>

  <!-- E-F: 2 -->
  <line x1="520" y1="328" x2="630" y2="238" stroke="#8b949e" stroke-width="1.2"/>
  <text x="586" y="296" text-anchor="middle" fill="#8b949e" font-size="12">2</text>

  <!-- === SHORTEST PATH EDGES (gold, thick) === -->
  <!-- Path: A -> B (2) -> C (3) -> ... wait, let me define a clear shortest path -->
  <!-- A-B: 2 -->
  <line x1="170" y1="204" x2="282" y2="118" stroke="#C9B896" stroke-width="3"/>
  <text x="215" y="148" text-anchor="middle" fill="#C9B896" font-size="13" font-weight="bold">2</text>

  <!-- B-E: 1 (short edge through bottom) -->
  <!-- Actually let me pick: A->B=2, B->D=5, but let me redesign edges for a nice path -->
  <!-- A->B: 2, B->C: 3 doesn't help. Let me use: A->B=2, B->E... no. -->
  <!-- Path: A(0) -2-> B(2) -3-> C(5) -1-> F(6) -->

  <!-- C-F: 1 -->
  <line x1="520" y1="108" x2="632" y2="204" stroke="#C9B896" stroke-width="3"/>
  <text x="588" y="148" text-anchor="middle" fill="#C9B896" font-size="13" font-weight="bold">1</text>

  <!-- A-E edge (non-path, gray) -->
  <line x1="170" y1="238" x2="480" y2="328" stroke="#8b949e" stroke-width="1.2"/>
  <text x="320" y="300" text-anchor="middle" fill="#8b949e" font-size="12">9</text>

  <!-- === NODES === -->
  <!-- A - on path -->
  <circle cx="150" cy="220" r="24" fill="#C9B896" fill-opacity="0.15" stroke="#C9B896" stroke-width="2.5"/>
  <text x="150" y="225" text-anchor="middle" fill="#C9B896" font-size="16" font-weight="bold">A</text>
  <text x="150" y="260" text-anchor="middle" fill="#C9B896" font-size="11">d=0</text>

  <!-- B - on path -->
  <circle cx="300" cy="100" r="24" fill="#C9B896" fill-opacity="0.15" stroke="#C9B896" stroke-width="2.5"/>
  <text x="300" y="105" text-anchor="middle" fill="#C9B896" font-size="16" font-weight="bold">B</text>
  <text x="300" y="72" text-anchor="middle" fill="#C9B896" font-size="11">d=2</text>

  <!-- C - on path -->
  <circle cx="500" cy="100" r="24" fill="#C9B896" fill-opacity="0.15" stroke="#C9B896" stroke-width="2.5"/>
  <text x="500" y="105" text-anchor="middle" fill="#C9B896" font-size="16" font-weight="bold">C</text>
  <text x="500" y="72" text-anchor="middle" fill="#C9B896" font-size="11">d=5</text>

  <!-- D - not on path -->
  <circle cx="300" cy="340" r="24" fill="none" stroke="#8b949e" stroke-width="1.5"/>
  <text x="300" y="345" text-anchor="middle" fill="#8b949e" font-size="16">D</text>
  <text x="300" y="378" text-anchor="middle" fill="#8b949e" font-size="11">d=7</text>

  <!-- E - not on path -->
  <circle cx="500" cy="340" r="24" fill="none" stroke="#8b949e" stroke-width="1.5"/>
  <text x="500" y="345" text-anchor="middle" fill="#8b949e" font-size="16">E</text>
  <text x="500" y="378" text-anchor="middle" fill="#8b949e" font-size="11">d=8</text>

  <!-- F - on path -->
  <circle cx="650" cy="220" r="24" fill="#C9B896" fill-opacity="0.15" stroke="#C9B896" stroke-width="2.5"/>
  <text x="650" y="225" text-anchor="middle" fill="#C9B896" font-size="16" font-weight="bold">F</text>
  <text x="650" y="260" text-anchor="middle" fill="#C9B896" font-size="11">d=6</text>

  <!-- Legend -->
  <rect x="40" y="395" width="720" height="30" rx="4" fill="#161b22" stroke="#8b949e" stroke-width="0.5"/>
  <line x1="60" y1="410" x2="90" y2="410" stroke="#C9B896" stroke-width="3"/>
  <text x="100" y="414" fill="#C9B896" font-size="11">Shortest path (total distance = 6)</text>
  <line x1="320" y1="410" x2="350" y2="410" stroke="#8b949e" stroke-width="1.2"/>
  <text x="360" y="414" fill="#8b949e" font-size="11">Other edges</text>
  <text x="530" y="414" fill="#e6edf3" font-size="11">d = shortest known distance from A</text>
</svg>