<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" font-family="Arial, sans-serif">
  <rect width="800" height="400" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold">Common Graph Types</text>

  <defs>
    <marker id="arrowDir" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e"/>
    </marker>
  </defs>

  <!-- ============= UNDIRECTED GRAPH (Left) ============= -->
  <text x="133" y="68" text-anchor="middle" fill="#C9B896" font-size="13" font-weight="bold">Undirected</text>
  <text x="133" y="84" text-anchor="middle" fill="#8b949e" font-size="11">Friendships</text>

  <!-- Nodes: pentagon-ish arrangement -->
  <!-- A: top center -->
  <circle cx="133" cy="120" r="16" fill="none" stroke="#C9B896" stroke-width="1.5"/>
  <text x="133" y="125" text-anchor="middle" fill="#e6edf3" font-size="11">A</text>
  <!-- B: right upper -->
  <circle cx="210" cy="170" r="16" fill="none" stroke="#C9B896" stroke-width="1.5"/>
  <text x="210" y="175" text-anchor="middle" fill="#e6edf3" font-size="11">B</text>
  <!-- C: right lower -->
  <circle cx="190" cy="260" r="16" fill="none" stroke="#C9B896" stroke-width="1.5"/>
  <text x="190" y="265" text-anchor="middle" fill="#e6edf3" font-size="11">C</text>
  <!-- D: left lower -->
  <circle cx="76" cy="260" r="16" fill="none" stroke="#C9B896" stroke-width="1.5"/>
  <text x="76" y="265" text-anchor="middle" fill="#e6edf3" font-size="11">D</text>
  <!-- E: left upper -->
  <circle cx="56" cy="170" r="16" fill="none" stroke="#C9B896" stroke-width="1.5"/>
  <text x="56" y="175" text-anchor="middle" fill="#e6edf3" font-size="11">E</text>

  <!-- Edges (undirected lines) -->
  <line x1="133" y1="136" x2="210" y2="154" stroke="#8b949e" stroke-width="1.2"/>
  <line x1="210" y1="186" x2="190" y2="244" stroke="#8b949e" stroke-width="1.2"/>
  <line x1="190" y1="260" x2="76" y2="260" stroke="#8b949e" stroke-width="1.2"/>
  <line x1="76" y1="244" x2="56" y2="186" stroke="#8b949e" stroke-width="1.2"/>
  <line x1="56" y1="154" x2="133" y2="136" stroke="#8b949e" stroke-width="1.2"/>
  <line x1="133" y1="136" x2="190" y2="244" stroke="#8b949e" stroke-width="1.2"/>
  <line x1="133" y1="136" x2="76" y2="244" stroke="#8b949e" stroke-width="1.2"/>

  <!-- Label -->
  <text x="133" y="310" text-anchor="middle" fill="#8b949e" font-size="10">e.g., social network</text>

  <!-- Separator -->
  <line x1="267" y1="60" x2="267" y2="330" stroke="#8b949e" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- ============= DIRECTED GRAPH (Center) ============= -->
  <text x="400" y="68" text-anchor="middle" fill="#C9B896" font-size="13" font-weight="bold">Directed</text>
  <text x="400" y="84" text-anchor="middle" fill="#8b949e" font-size="11">Dependencies</text>

  <!-- Nodes -->
  <circle cx="400" cy="120" r="16" fill="none" stroke="#C9B896" stroke-width="1.5"/>
  <text x="400" y="125" text-anchor="middle" fill="#e6edf3" font-size="11">A</text>

  <circle cx="477" cy="170" r="16" fill="none" stroke="#C9B896" stroke-width="1.5"/>
  <text x="477" y="175" text-anchor="middle" fill="#e6edf3" font-size="11">B</text>

  <circle cx="457" cy="260" r="16" fill="none" stroke="#C9B896" stroke-width="1.5"/>
  <text x="457" y="265" text-anchor="middle" fill="#e6edf3" font-size="11">C</text>

  <circle cx="343" cy="260" r="16" fill="none" stroke="#C9B896" stroke-width="1.5"/>
  <text x="343" y="265" text-anchor="middle" fill="#e6edf3" font-size="11">D</text>

  <circle cx="323" cy="170" r="16" fill="none" stroke="#C9B896" stroke-width="1.5"/>
  <text x="323" y="175" text-anchor="middle" fill="#e6edf3" font-size="11">E</text>

  <!-- Directed edges (arrows) -->
  <line x1="414" y1="132" x2="464" y2="158" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arrowDir)"/>
  <line x1="477" y1="186" x2="460" y2="244" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arrowDir)"/>
  <line x1="441" y1="260" x2="359" y2="260" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arrowDir)"/>
  <line x1="386" y1="132" x2="336" y2="158" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arrowDir)"/>
  <line x1="323" y1="186" x2="340" y2="244" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arrowDir)"/>
  <line x1="400" y1="136" x2="450" y2="248" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arrowDir)"/>

  <!-- Label -->
  <text x="400" y="310" text-anchor="middle" fill="#8b949e" font-size="10">e.g., build dependencies</text>

  <!-- Separator -->
  <line x1="533" y1="60" x2="533" y2="330" stroke="#8b949e" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- ============= WEIGHTED GRAPH (Right) ============= -->
  <text x="667" y="68" text-anchor="middle" fill="#C9B896" font-size="13" font-weight="bold">Weighted</text>
  <text x="667" y="84" text-anchor="middle" fill="#8b949e" font-size="11">Distances</text>

  <!-- Nodes -->
  <circle cx="667" cy="120" r="16" fill="none" stroke="#C9B896" stroke-width="1.5"/>
  <text x="667" y="125" text-anchor="middle" fill="#e6edf3" font-size="11">A</text>

  <circle cx="744" cy="170" r="16" fill="none" stroke="#C9B896" stroke-width="1.5"/>
  <text x="744" y="175" text-anchor="middle" fill="#e6edf3" font-size="11">B</text>

  <circle cx="724" cy="260" r="16" fill="none" stroke="#C9B896" stroke-width="1.5"/>
  <text x="724" y="265" text-anchor="middle" fill="#e6edf3" font-size="11">C</text>

  <circle cx="610" cy="260" r="16" fill="none" stroke="#C9B896" stroke-width="1.5"/>
  <text x="610" y="265" text-anchor="middle" fill="#e6edf3" font-size="11">D</text>

  <circle cx="590" cy="170" r="16" fill="none" stroke="#C9B896" stroke-width="1.5"/>
  <text x="590" y="175" text-anchor="middle" fill="#e6edf3" font-size="11">E</text>

  <!-- Weighted edges -->
  <line x1="681" y1="132" x2="730" y2="158" stroke="#8b949e" stroke-width="1.2"/>
  <text x="714" y="140" text-anchor="middle" fill="#388bfd" font-size="10" font-weight="bold">4</text>

  <line x1="744" y1="186" x2="727" y2="244" stroke="#8b949e" stroke-width="1.2"/>
  <text x="743" y="220" text-anchor="middle" fill="#388bfd" font-size="10" font-weight="bold">2</text>

  <line x1="708" y1="260" x2="626" y2="260" stroke="#8b949e" stroke-width="1.2"/>
  <text x="667" y="254" text-anchor="middle" fill="#388bfd" font-size="10" font-weight="bold">7</text>

  <line x1="610" y1="244" x2="590" y2="186" stroke="#8b949e" stroke-width="1.2"/>
  <text x="593" y="220" text-anchor="middle" fill="#388bfd" font-size="10" font-weight="bold">3</text>

  <line x1="604" y1="158" x2="653" y2="132" stroke="#8b949e" stroke-width="1.2"/>
  <text x="622" y="140" text-anchor="middle" fill="#388bfd" font-size="10" font-weight="bold">5</text>

  <line x1="667" y1="136" x2="724" y2="244" stroke="#8b949e" stroke-width="1.2"/>
  <text x="704" y="186" text-anchor="middle" fill="#388bfd" font-size="10" font-weight="bold">9</text>

  <!-- Label -->
  <text x="667" y="310" text-anchor="middle" fill="#8b949e" font-size="10">e.g., road distances</text>

  <!-- Bottom explanation -->
  <text x="400" y="370" text-anchor="middle" fill="#8b949e" font-size="11">Graphs model relationships between entities. The type of graph determines what information each edge carries.</text>
</svg>