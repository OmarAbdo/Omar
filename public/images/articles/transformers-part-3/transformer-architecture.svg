<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" font-family="Arial, sans-serif">
  <rect width="800" height="720" fill="#0d1117"/>

  <defs>
    <marker id="tArrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#8b949e"/>
    </marker>
    <marker id="tArrowGold" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#C9B896"/>
    </marker>
    <marker id="tArrowBlue" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#388bfd"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold">The Transformer Architecture</text>

  <!-- ===================== ENCODER SIDE (LEFT) ===================== -->
  <text x="220" y="58" text-anchor="middle" fill="#C9B896" font-size="14" font-weight="bold">Encoder</text>

  <!-- Input Embedding + Positional Encoding -->
  <rect x="130" y="640" width="180" height="30" rx="6" fill="none" stroke="#8b949e" stroke-width="1"/>
  <text x="220" y="660" text-anchor="middle" fill="#e6edf3" font-size="10">Input Embedding</text>

  <rect x="130" y="600" width="180" height="30" rx="6" fill="none" stroke="#388bfd" stroke-opacity="0.6" stroke-width="1"/>
  <text x="220" y="620" text-anchor="middle" fill="#388bfd" fill-opacity="0.8" font-size="10">+ Positional Encoding</text>

  <!-- Inputs label -->
  <text x="220" y="695" text-anchor="middle" fill="#8b949e" font-size="11">Inputs</text>
  <line x1="220" y1="685" x2="220" y2="672" stroke="#8b949e" stroke-width="1" marker-end="url(#tArrow)"/>

  <!-- Arrow up from pos enc -->
  <line x1="220" y1="638" x2="220" y2="632" stroke="#8b949e" stroke-width="1"/>
  <line x1="220" y1="598" x2="220" y2="575" stroke="#8b949e" stroke-width="1" marker-end="url(#tArrow)"/>

  <!-- Encoder block (repeated Nx) -->
  <rect x="120" y="70" width="200" height="502" rx="10" fill="none" stroke="#C9B896" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="325" y="325" fill="#C9B896" fill-opacity="0.6" font-size="11" transform="rotate(-90, 325, 325)">x 6 layers</text>

  <!-- Self-Attention -->
  <rect x="145" y="520" width="150" height="32" rx="6" fill="#C9B896" fill-opacity="0.1" stroke="#C9B896" stroke-width="1.5"/>
  <text x="220" y="541" text-anchor="middle" fill="#e6edf3" font-size="10">Self-Attention</text>

  <!-- Add & Norm 1 -->
  <rect x="145" y="470" width="150" height="28" rx="6" fill="none" stroke="#8b949e" stroke-opacity="0.5" stroke-width="1"/>
  <text x="220" y="489" text-anchor="middle" fill="#8b949e" font-size="10">Add &amp; Norm</text>
  <line x1="220" y1="518" x2="220" y2="500" stroke="#8b949e" stroke-width="1" marker-end="url(#tArrow)"/>

  <!-- Residual connection 1 (encoder) -->
  <path d="M 143,540 L 130,540 L 130,484 L 143,484" fill="none" stroke="#8b949e" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Feed Forward -->
  <rect x="145" y="415" width="150" height="32" rx="6" fill="#388bfd" fill-opacity="0.08" stroke="#388bfd" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="220" y="436" text-anchor="middle" fill="#e6edf3" font-size="10">Feed Forward</text>
  <line x1="220" y1="468" x2="220" y2="449" stroke="#8b949e" stroke-width="1" marker-end="url(#tArrow)"/>

  <!-- Add & Norm 2 -->
  <rect x="145" y="365" width="150" height="28" rx="6" fill="none" stroke="#8b949e" stroke-opacity="0.5" stroke-width="1"/>
  <text x="220" y="384" text-anchor="middle" fill="#8b949e" font-size="10">Add &amp; Norm</text>
  <line x1="220" y1="413" x2="220" y2="395" stroke="#8b949e" stroke-width="1" marker-end="url(#tArrow)"/>

  <!-- Residual connection 2 (encoder) -->
  <path d="M 143,431 L 130,431 L 130,379 L 143,379" fill="none" stroke="#8b949e" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Encoder output arrow (to top and cross-attention) -->
  <line x1="220" y1="363" x2="220" y2="80" stroke="#C9B896" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="220" y="95" text-anchor="middle" fill="#8b949e" font-size="9">encoder output</text>

  <!-- ===================== DECODER SIDE (RIGHT) ===================== -->
  <text x="570" y="58" text-anchor="middle" fill="#388bfd" font-size="14" font-weight="bold">Decoder</text>

  <!-- Output Embedding + Positional Encoding -->
  <rect x="480" y="640" width="180" height="30" rx="6" fill="none" stroke="#8b949e" stroke-width="1"/>
  <text x="570" y="660" text-anchor="middle" fill="#e6edf3" font-size="10">Output Embedding</text>

  <rect x="480" y="600" width="180" height="30" rx="6" fill="none" stroke="#388bfd" stroke-opacity="0.6" stroke-width="1"/>
  <text x="570" y="620" text-anchor="middle" fill="#388bfd" fill-opacity="0.8" font-size="10">+ Positional Encoding</text>

  <!-- Outputs label -->
  <text x="570" y="695" text-anchor="middle" fill="#8b949e" font-size="11">Outputs (shifted right)</text>
  <line x1="570" y1="685" x2="570" y2="672" stroke="#8b949e" stroke-width="1" marker-end="url(#tArrow)"/>

  <line x1="570" y1="638" x2="570" y2="632" stroke="#8b949e" stroke-width="1"/>
  <line x1="570" y1="598" x2="570" y2="575" stroke="#8b949e" stroke-width="1" marker-end="url(#tArrow)"/>

  <!-- Decoder block -->
  <rect x="470" y="70" width="200" height="502" rx="10" fill="none" stroke="#388bfd" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="675" y="325" fill="#388bfd" fill-opacity="0.5" font-size="11" transform="rotate(-90, 675, 325)">x 6 layers</text>

  <!-- Masked Self-Attention -->
  <rect x="495" y="520" width="150" height="32" rx="6" fill="#C9B896" fill-opacity="0.1" stroke="#C9B896" stroke-width="1.5"/>
  <text x="570" y="537" text-anchor="middle" fill="#e6edf3" font-size="9">Masked Self-Attention</text>

  <!-- Add & Norm 1 (decoder) -->
  <rect x="495" y="470" width="150" height="28" rx="6" fill="none" stroke="#8b949e" stroke-opacity="0.5" stroke-width="1"/>
  <text x="570" y="489" text-anchor="middle" fill="#8b949e" font-size="10">Add &amp; Norm</text>
  <line x1="570" y1="518" x2="570" y2="500" stroke="#8b949e" stroke-width="1" marker-end="url(#tArrow)"/>

  <!-- Residual -->
  <path d="M 493,540 L 480,540 L 480,484 L 493,484" fill="none" stroke="#8b949e" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Cross-Attention -->
  <rect x="495" y="415" width="150" height="32" rx="6" fill="#C9B896" fill-opacity="0.15" stroke="#C9B896" stroke-width="2"/>
  <text x="570" y="436" text-anchor="middle" fill="#C9B896" font-size="10" font-weight="bold">Cross-Attention</text>
  <line x1="570" y1="468" x2="570" y2="449" stroke="#8b949e" stroke-width="1" marker-end="url(#tArrow)"/>

  <!-- Cross-attention arrow from encoder -->
  <line x1="320" y1="200" x2="493" y2="425" stroke="#C9B896" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#tArrowGold)"/>
  <text x="385" y="295" fill="#C9B896" fill-opacity="0.6" font-size="9" transform="rotate(48, 385, 295)">K, V from encoder</text>

  <!-- Add & Norm 2 (decoder) -->
  <rect x="495" y="365" width="150" height="28" rx="6" fill="none" stroke="#8b949e" stroke-opacity="0.5" stroke-width="1"/>
  <text x="570" y="384" text-anchor="middle" fill="#8b949e" font-size="10">Add &amp; Norm</text>
  <line x1="570" y1="413" x2="570" y2="395" stroke="#8b949e" stroke-width="1" marker-end="url(#tArrow)"/>

  <!-- Residual -->
  <path d="M 493,431 L 480,431 L 480,379 L 493,379" fill="none" stroke="#8b949e" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Feed Forward (decoder) -->
  <rect x="495" y="310" width="150" height="32" rx="6" fill="#388bfd" fill-opacity="0.08" stroke="#388bfd" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="570" y="331" text-anchor="middle" fill="#e6edf3" font-size="10">Feed Forward</text>
  <line x1="570" y1="363" x2="570" y2="344" stroke="#8b949e" stroke-width="1" marker-end="url(#tArrow)"/>

  <!-- Add & Norm 3 (decoder) -->
  <rect x="495" y="260" width="150" height="28" rx="6" fill="none" stroke="#8b949e" stroke-opacity="0.5" stroke-width="1"/>
  <text x="570" y="279" text-anchor="middle" fill="#8b949e" font-size="10">Add &amp; Norm</text>
  <line x1="570" y1="308" x2="570" y2="290" stroke="#8b949e" stroke-width="1" marker-end="url(#tArrow)"/>

  <!-- Residual -->
  <path d="M 493,326 L 480,326 L 480,274 L 493,274" fill="none" stroke="#8b949e" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ===================== TOP: Output Head ===================== -->
  <!-- Arrow up from decoder -->
  <line x1="570" y1="258" x2="570" y2="185" stroke="#8b949e" stroke-width="1.5" marker-end="url(#tArrow)"/>

  <!-- Linear -->
  <rect x="505" y="153" width="130" height="30" rx="6" fill="none" stroke="#C9B896" stroke-opacity="0.6" stroke-width="1"/>
  <text x="570" y="173" text-anchor="middle" fill="#e6edf3" font-size="10">Linear</text>

  <!-- Arrow -->
  <line x1="570" y1="151" x2="570" y2="128" stroke="#8b949e" stroke-width="1.5" marker-end="url(#tArrow)"/>

  <!-- Softmax -->
  <rect x="505" y="96" width="130" height="30" rx="6" fill="none" stroke="#C9B896" stroke-opacity="0.6" stroke-width="1"/>
  <text x="570" y="116" text-anchor="middle" fill="#e6edf3" font-size="10">Softmax</text>

  <!-- Arrow to output -->
  <line x1="570" y1="94" x2="570" y2="80" stroke="#C9B896" stroke-width="1.5" marker-end="url(#tArrowGold)"/>

  <!-- Output label -->
  <text x="570" y="76" text-anchor="middle" fill="#C9B896" font-size="11" font-weight="bold">Output Probabilities</text>
</svg>