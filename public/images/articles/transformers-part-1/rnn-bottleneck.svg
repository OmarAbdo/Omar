<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Arial, sans-serif">
  <rect width="800" height="400" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold">Sequential Processing: Information from Early Words Fades</text>

  <!-- Words and boxes -->
  <!-- Word 1: "The" - most faded -->
  <rect x="30" y="140" width="90" height="44" rx="10" ry="10" fill="none" stroke="#C9B896" stroke-opacity="0.2" stroke-width="1.5"/>
  <text x="75" y="167" text-anchor="middle" fill="#e6edf3" fill-opacity="0.25" font-size="15">The</text>

  <!-- Word 2: "cat" -->
  <rect x="155" y="140" width="90" height="44" rx="10" ry="10" fill="none" stroke="#C9B896" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="200" y="167" text-anchor="middle" fill="#e6edf3" fill-opacity="0.4" font-size="15">cat</text>

  <!-- Word 3: "sat" -->
  <rect x="280" y="140" width="90" height="44" rx="10" ry="10" fill="none" stroke="#C9B896" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="325" y="167" text-anchor="middle" fill="#e6edf3" fill-opacity="0.55" font-size="15">sat</text>

  <!-- Word 4: "on" -->
  <rect x="405" y="140" width="90" height="44" rx="10" ry="10" fill="none" stroke="#C9B896" stroke-opacity="0.65" stroke-width="1.5"/>
  <text x="450" y="167" text-anchor="middle" fill="#e6edf3" fill-opacity="0.7" font-size="15">on</text>

  <!-- Word 5: "the" -->
  <rect x="530" y="140" width="90" height="44" rx="10" ry="10" fill="none" stroke="#C9B896" stroke-opacity="0.8" stroke-width="1.5"/>
  <text x="575" y="167" text-anchor="middle" fill="#e6edf3" fill-opacity="0.85" font-size="15">the</text>

  <!-- Word 6: "mat" - brightest -->
  <rect x="655" y="140" width="90" height="44" rx="10" ry="10" fill="none" stroke="#C9B896" stroke-opacity="1" stroke-width="2"/>
  <text x="700" y="167" text-anchor="middle" fill="#e6edf3" fill-opacity="1" font-size="15" font-weight="bold">mat</text>

  <!-- Arrows between words -->
  <defs>
    <marker id="arrow1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#C9B896" fill-opacity="0.25"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#C9B896" fill-opacity="0.4"/>
    </marker>
    <marker id="arrow3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#C9B896" fill-opacity="0.55"/>
    </marker>
    <marker id="arrow4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#C9B896" fill-opacity="0.7"/>
    </marker>
    <marker id="arrow5" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#C9B896" fill-opacity="0.85"/>
    </marker>
  </defs>

  <line x1="120" y1="162" x2="153" y2="162" stroke="#C9B896" stroke-opacity="0.25" stroke-width="1.5" marker-end="url(#arrow1)"/>
  <line x1="245" y1="162" x2="278" y2="162" stroke="#C9B896" stroke-opacity="0.4" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="370" y1="162" x2="403" y2="162" stroke="#C9B896" stroke-opacity="0.55" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <line x1="495" y1="162" x2="528" y2="162" stroke="#C9B896" stroke-opacity="0.7" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <line x1="620" y1="162" x2="653" y2="162" stroke="#C9B896" stroke-opacity="0.85" stroke-width="1.5" marker-end="url(#arrow5)"/>

  <!-- Hidden state labels -->
  <text x="137" y="132" text-anchor="middle" fill="#8b949e" font-size="10" fill-opacity="0.4">h₁</text>
  <text x="262" y="132" text-anchor="middle" fill="#8b949e" font-size="10" fill-opacity="0.5">h₂</text>
  <text x="387" y="132" text-anchor="middle" fill="#8b949e" font-size="10" fill-opacity="0.6">h₃</text>
  <text x="512" y="132" text-anchor="middle" fill="#8b949e" font-size="10" fill-opacity="0.75">h₄</text>
  <text x="637" y="132" text-anchor="middle" fill="#8b949e" font-size="10" fill-opacity="0.9">h₅</text>

  <!-- Hidden state bar visualization below -->
  <text x="400" y="230" text-anchor="middle" fill="#8b949e" font-size="12">Hidden State Capacity</text>

  <!-- Gradient bar showing information loss -->
  <defs>
    <linearGradient id="fadeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9B896" stop-opacity="0.08"/>
      <stop offset="20%" stop-color="#C9B896" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="#C9B896" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#C9B896" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#C9B896" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#C9B896" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="60" y="245" width="680" height="16" rx="4" fill="url(#fadeGrad)"/>

  <!-- Labels under bar -->
  <text x="60" y="280" text-anchor="start" fill="#8b949e" font-size="10" fill-opacity="0.5">Early information lost</text>
  <text x="740" y="280" text-anchor="end" fill="#8b949e" font-size="10">Recent information preserved</text>

  <!-- Bottom note -->
  <text x="400" y="330" text-anchor="middle" fill="#8b949e" font-size="12">Fixed-size hidden state creates a bottleneck — the model must compress</text>
  <text x="400" y="348" text-anchor="middle" fill="#8b949e" font-size="12">the entire sequence into a single vector at each step.</text>

  <!-- Time arrow -->
  <defs>
    <marker id="timeArrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#388bfd"/>
    </marker>
  </defs>
  <line x1="60" y1="380" x2="740" y2="380" stroke="#388bfd" stroke-opacity="0.4" stroke-width="1" marker-end="url(#timeArrow)"/>
  <text x="400" y="395" text-anchor="middle" fill="#388bfd" fill-opacity="0.5" font-size="10">Time →</text>
</svg>