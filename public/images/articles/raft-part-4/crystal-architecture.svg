<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="ui-sans-serif, system-ui, sans-serif" role="img" aria-label="Crystal DB architecture: an HTTP layer feeds a single-writer Raft control loop, which persists entries to a crash-safe write-ahead log and drives per-peer replication goroutines. Committed entries are applied to a pluggable state machine, and periodic snapshots compact the log.">
  <defs>
    <marker id="a4" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#d4a24e"/></marker>
    <style>
      .layer{fill:#f7f7f8;stroke:#e2e2e6;}
      .core{fill:#fbf4e6;stroke:#d4a24e;stroke-width:1.5;}
      .store{fill:#eef1f4;stroke:#d1d5db;}
      .t{fill:#1a1c22;}.m{fill:#6b7280;}
      .flow{stroke:#d4a24e;stroke-width:1.8;fill:none;}
      @media (prefers-color-scheme: dark){
        .layer{fill:#15171c;stroke:#2a2d35;}
        .core{fill:#221c10;stroke:#d4a24e;}
        .store{fill:#1b1e25;stroke:#2a2d35;}
        .t{fill:#e8e8ea;}.m{fill:#9aa0aa;}
      }
    </style>
  </defs>

  <!-- HTTP layer -->
  <rect class="layer" x="40" y="30" width="200" height="60" rx="10"/>
  <text class="t" x="140" y="56" font-size="13" font-weight="700" text-anchor="middle">HTTP / Client API</text>
  <text class="m" x="140" y="76" font-size="10" text-anchor="middle">GET · SET · DELETE</text>

  <path class="flow" d="M140 90 V125" marker-end="url(#a4)"/>
  <text class="m" x="150" y="112" font-size="10">proposals</text>

  <!-- Raft core -->
  <rect class="core" x="40" y="125" width="360" height="120" rx="12"/>
  <text class="t" x="60" y="150" font-size="13" font-weight="700">Raft core — single-writer control loop</text>
  <text class="m" x="60" y="172" font-size="11">• leader election &amp; term step-down</text>
  <text class="m" x="60" y="190" font-size="11">• commit rule (Figure 8) &amp; safety checks</text>
  <text class="m" x="60" y="208" font-size="11">• one goroutine owns all state → no data races</text>
  <text class="m" x="60" y="226" font-size="11">• drives per-peer replication goroutines</text>

  <!-- WAL -->
  <rect class="store" x="440" y="30" width="280" height="70" rx="10"/>
  <text class="t" x="580" y="56" font-size="12" font-weight="700" text-anchor="middle">Write-Ahead Log (fsync)</text>
  <text class="m" x="580" y="76" font-size="10" text-anchor="middle">durable, crash-recoverable entries</text>
  <path class="flow" d="M400 160 C430 120 440 100 460 100" marker-end="url(#a4)"/>
  <text class="m" x="420" y="118" font-size="10">persist</text>

  <!-- Snapshots -->
  <rect class="store" x="440" y="120" width="280" height="70" rx="10"/>
  <text class="t" x="580" y="146" font-size="12" font-weight="700" text-anchor="middle">Snapshots (log compaction)</text>
  <text class="m" x="580" y="166" font-size="10" text-anchor="middle">InstallSnapshot RPC for lagging peers</text>
  <path class="flow" d="M400 185 H436" marker-end="url(#a4)"/>

  <!-- State machine -->
  <rect class="store" x="440" y="210" width="280" height="70" rx="10"/>
  <text class="t" x="580" y="236" font-size="12" font-weight="700" text-anchor="middle">Pluggable State Machine</text>
  <text class="m" x="580" y="256" font-size="10" text-anchor="middle">StateMachine interface → map · LSM-tree</text>
  <path class="flow" d="M400 220 C420 240 425 245 436 245" marker-end="url(#a4)"/>
  <text class="m" x="405" y="262" font-size="10">apply committed</text>

  <!-- Peers -->
  <rect class="layer" x="40" y="300" width="360" height="70" rx="10"/>
  <text class="t" x="220" y="326" font-size="12" font-weight="700" text-anchor="middle">Peer replication goroutines → Followers</text>
  <text class="m" x="220" y="346" font-size="10" text-anchor="middle">AppendEntries · heartbeats · nextIndex per peer</text>
  <path class="flow" d="M220 245 V296" marker-end="url(#a4)"/>

  <text class="m" x="40" y="392" font-size="10">Dependencies point one way: storage imports Raft; Raft never imports HTTP or the key-value layer.</text>
</svg>
