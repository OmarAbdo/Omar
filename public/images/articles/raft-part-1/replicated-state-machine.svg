<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="ui-sans-serif, system-ui, sans-serif" role="img" aria-label="Replicated state machine architecture: clients send commands to a consensus module that replicates an identical log to each server, and each server's state machine executes the log in order.">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#d4a24e"/>
    </marker>
    <style>
      .card{fill:#f7f7f8;stroke:#e2e2e6;}
      .cardh{fill:#eef1f4;stroke:#e2e2e6;}
      .t{fill:#1a1c22;}
      .m{fill:#6b7280;}
      .log{fill:#ffffff;stroke:#d1d5db;}
      .flow{stroke:#d4a24e;stroke-width:2;fill:none;}
      .gold{fill:#d4a24e;}
      @media (prefers-color-scheme: dark){
        .card{fill:#15171c;stroke:#2a2d35;}
        .cardh{fill:#1b1e25;stroke:#2a2d35;}
        .t{fill:#e8e8ea;}
        .m{fill:#9aa0aa;}
        .log{fill:#0f1116;stroke:#2a2d35;}
      }
    </style>
  </defs>

  <!-- Client -->
  <rect class="cardh" x="20" y="150" width="110" height="70" rx="10"/>
  <text class="t" x="75" y="180" font-size="14" font-weight="700" text-anchor="middle">Client</text>
  <text class="m" x="75" y="200" font-size="11" text-anchor="middle">SET x=3</text>

  <!-- arrow client -> consensus -->
  <path class="flow" d="M130 185 H175" marker-end="url(#ah)"/>

  <!-- Three server nodes -->
  <g>
    <!-- node template repeated -->
    <!-- Node 1 -->
    <rect class="card" x="185" y="20" width="340" height="100" rx="12"/>
    <text class="t" x="205" y="45" font-size="12" font-weight="700">Server 1 (Leader)</text>
    <rect class="cardh" x="205" y="55" width="120" height="48" rx="8"/>
    <text class="m" x="265" y="75" font-size="10" text-anchor="middle">Consensus</text>
    <text class="m" x="265" y="90" font-size="10" text-anchor="middle">Module</text>
    <g>
      <rect class="log" x="345" y="55" width="30" height="48" rx="4"/>
      <rect class="log" x="378" y="55" width="30" height="48" rx="4"/>
      <rect class="log" x="411" y="55" width="30" height="48" rx="4"/>
      <rect class="log" x="444" y="55" width="30" height="48" rx="4"/>
    </g>
    <text class="m" x="486" y="83" font-size="10">→ SM</text>

    <!-- Node 2 -->
    <rect class="card" x="185" y="140" width="340" height="100" rx="12"/>
    <text class="t" x="205" y="165" font-size="12" font-weight="700">Server 2 (Follower)</text>
    <rect class="cardh" x="205" y="175" width="120" height="48" rx="8"/>
    <text class="m" x="265" y="195" font-size="10" text-anchor="middle">Consensus</text>
    <text class="m" x="265" y="210" font-size="10" text-anchor="middle">Module</text>
    <g>
      <rect class="log" x="345" y="175" width="30" height="48" rx="4"/>
      <rect class="log" x="378" y="175" width="30" height="48" rx="4"/>
      <rect class="log" x="411" y="175" width="30" height="48" rx="4"/>
      <rect class="log" x="444" y="175" width="30" height="48" rx="4"/>
    </g>
    <text class="m" x="486" y="203" font-size="10">→ SM</text>

    <!-- Node 3 -->
    <rect class="card" x="185" y="260" width="340" height="100" rx="12"/>
    <text class="t" x="205" y="285" font-size="12" font-weight="700">Server 3 (Follower)</text>
    <rect class="cardh" x="205" y="295" width="120" height="48" rx="8"/>
    <text class="m" x="265" y="315" font-size="10" text-anchor="middle">Consensus</text>
    <text class="m" x="265" y="330" font-size="10" text-anchor="middle">Module</text>
    <g>
      <rect class="log" x="345" y="295" width="30" height="48" rx="4"/>
      <rect class="log" x="378" y="295" width="30" height="48" rx="4"/>
      <rect class="log" x="411" y="295" width="30" height="48" rx="4"/>
      <rect class="log" x="444" y="295" width="30" height="48" rx="4"/>
    </g>
    <text class="m" x="486" y="323" font-size="10">→ SM</text>
  </g>

  <!-- replication arrows leader -> followers -->
  <path class="flow" d="M355 108 C355 130 355 130 355 168" marker-end="url(#ah)"/>
  <path class="flow" d="M410 108 C410 240 410 240 410 288" marker-end="url(#ah)"/>
  <text class="gold" x="420" y="135" font-size="10">replicate log</text>

  <!-- Identical state note -->
  <rect class="cardh" x="560" y="150" width="180" height="70" rx="10"/>
  <text class="t" x="650" y="178" font-size="12" font-weight="700" text-anchor="middle">Identical logs →</text>
  <text class="m" x="650" y="198" font-size="11" text-anchor="middle">identical state on</text>
  <text class="m" x="650" y="212" font-size="11" text-anchor="middle">every server</text>
  <path class="flow" d="M525 185 H555" marker-end="url(#ah)"/>
</svg>
