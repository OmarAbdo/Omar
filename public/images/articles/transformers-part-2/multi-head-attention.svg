<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" font-family="Arial, sans-serif">
  <rect width="800" height="550" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold">Multi-Head Attention: Multiple Perspectives</text>

  <defs>
    <marker id="mhaArrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#8b949e"/>
    </marker>
    <marker id="mhaArrowGold" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#C9B896"/>
    </marker>
  </defs>

  <!-- Input box -->
  <rect x="320" y="60" width="160" height="42" rx="8" fill="none" stroke="#8b949e" stroke-width="1.5"/>
  <text x="400" y="86" text-anchor="middle" fill="#e6edf3" font-size="14">Input Embeddings</text>

  <!-- Arrow from input splitting into heads -->
  <line x1="400" y1="102" x2="400" y2="135" stroke="#8b949e" stroke-width="1.5" marker-end="url(#mhaArrow)"/>

  <!-- Linear projection box -->
  <rect x="280" y="138" width="240" height="32" rx="6" fill="none" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="400" y="159" text-anchor="middle" fill="#8b949e" font-size="11">Linear Projections (Q, K, V for each head)</text>

  <!-- Arrows down to heads -->
  <line x1="105" y1="170" x2="105" y2="198" stroke="#8b949e" stroke-width="1" marker-end="url(#mhaArrow)"/>
  <line x1="205" y1="170" x2="205" y2="198" stroke="#8b949e" stroke-width="1" marker-end="url(#mhaArrow)"/>
  <line x1="305" y1="170" x2="305" y2="198" stroke="#8b949e" stroke-width="1" marker-end="url(#mhaArrow)"/>
  <line x1="405" y1="170" x2="405" y2="198" stroke="#8b949e" stroke-width="1" marker-end="url(#mhaArrow)"/>
  <line x1="500" y1="170" x2="500" y2="198" stroke="#8b949e" stroke-width="1" marker-end="url(#mhaArrow)"/>
  <line x1="595" y1="170" x2="595" y2="198" stroke="#8b949e" stroke-width="1" marker-end="url(#mhaArrow)"/>
  <line x1="695" y1="170" x2="695" y2="198" stroke="#8b949e" stroke-width="1" marker-end="url(#mhaArrow)"/>

  <!-- Head 1: Syntax -->
  <rect x="65" y="200" width="80" height="140" rx="6" fill="#C9B896" fill-opacity="0.12" stroke="#C9B896" stroke-width="1.5"/>
  <text x="105" y="225" text-anchor="middle" fill="#C9B896" font-size="11" font-weight="bold">Head 1</text>
  <text x="105" y="270" text-anchor="middle" fill="#e6edf3" font-size="10">Syntax</text>
  <text x="105" y="285" text-anchor="middle" fill="#8b949e" font-size="9">subject-verb</text>
  <text x="105" y="298" text-anchor="middle" fill="#8b949e" font-size="9">agreement</text>

  <!-- Head 2: Semantics -->
  <rect x="165" y="200" width="80" height="140" rx="6" fill="#C9B896" fill-opacity="0.09" stroke="#C9B896" stroke-opacity="0.8" stroke-width="1.5"/>
  <text x="205" y="225" text-anchor="middle" fill="#C9B896" fill-opacity="0.85" font-size="11" font-weight="bold">Head 2</text>
  <text x="205" y="270" text-anchor="middle" fill="#e6edf3" font-size="10">Meaning</text>
  <text x="205" y="285" text-anchor="middle" fill="#8b949e" font-size="9">semantic</text>
  <text x="205" y="298" text-anchor="middle" fill="#8b949e" font-size="9">similarity</text>

  <!-- Head 3: Position -->
  <rect x="265" y="200" width="80" height="140" rx="6" fill="#388bfd" fill-opacity="0.08" stroke="#388bfd" stroke-opacity="0.6" stroke-width="1.5"/>
  <text x="305" y="225" text-anchor="middle" fill="#388bfd" fill-opacity="0.85" font-size="11" font-weight="bold">Head 3</text>
  <text x="305" y="270" text-anchor="middle" fill="#e6edf3" font-size="10">Position</text>
  <text x="305" y="285" text-anchor="middle" fill="#8b949e" font-size="9">nearby</text>
  <text x="305" y="298" text-anchor="middle" fill="#8b949e" font-size="9">words</text>

  <!-- Head 4: Coreference -->
  <rect x="365" y="200" width="80" height="140" rx="6" fill="#388bfd" fill-opacity="0.06" stroke="#388bfd" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="405" y="225" text-anchor="middle" fill="#388bfd" fill-opacity="0.7" font-size="11" font-weight="bold">Head 4</text>
  <text x="405" y="270" text-anchor="middle" fill="#e6edf3" font-size="10">Coreference</text>
  <text x="405" y="285" text-anchor="middle" fill="#8b949e" font-size="9">pronoun</text>
  <text x="405" y="298" text-anchor="middle" fill="#8b949e" font-size="9">resolution</text>

  <!-- Heads 5-8: abbreviated -->
  <rect x="462" y="200" width="75" height="140" rx="6" fill="none" stroke="#8b949e" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="500" y="275" text-anchor="middle" fill="#8b949e" fill-opacity="0.5" font-size="11">Head 5</text>

  <rect x="557" y="200" width="75" height="140" rx="6" fill="none" stroke="#8b949e" stroke-opacity="0.25" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="595" y="275" text-anchor="middle" fill="#8b949e" fill-opacity="0.4" font-size="11">Head 6</text>

  <!-- Dots indicating more heads -->
  <text x="648" y="275" text-anchor="middle" fill="#8b949e" fill-opacity="0.5" font-size="20">...</text>

  <rect x="660" y="200" width="70" height="140" rx="6" fill="none" stroke="#8b949e" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="695" y="275" text-anchor="middle" fill="#8b949e" fill-opacity="0.35" font-size="11">Head 8</text>

  <!-- Arrows down from heads to concat -->
  <line x1="105" y1="340" x2="105" y2="375" stroke="#C9B896" stroke-width="1" marker-end="url(#mhaArrowGold)"/>
  <line x1="205" y1="340" x2="205" y2="375" stroke="#C9B896" stroke-opacity="0.8" stroke-width="1"/>
  <line x1="305" y1="340" x2="305" y2="375" stroke="#8b949e" stroke-width="1"/>
  <line x1="405" y1="340" x2="405" y2="375" stroke="#8b949e" stroke-width="1"/>
  <line x1="500" y1="340" x2="500" y2="375" stroke="#8b949e" stroke-opacity="0.5" stroke-width="1"/>
  <line x1="595" y1="340" x2="595" y2="375" stroke="#8b949e" stroke-opacity="0.4" stroke-width="1"/>
  <line x1="695" y1="340" x2="695" y2="375" stroke="#8b949e" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Concatenate bar -->
  <rect x="60" y="378" width="680" height="36" rx="6" fill="#C9B896" fill-opacity="0.08" stroke="#C9B896" stroke-width="1.5"/>
  <text x="400" y="401" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">Concatenate</text>

  <!-- Arrow to Linear -->
  <line x1="400" y1="414" x2="400" y2="440" stroke="#C9B896" stroke-width="1.5" marker-end="url(#mhaArrowGold)"/>

  <!-- Linear projection -->
  <rect x="300" y="443" width="200" height="38" rx="8" fill="#C9B896" fill-opacity="0.12" stroke="#C9B896" stroke-width="1.5"/>
  <text x="400" y="467" text-anchor="middle" fill="#e6edf3" font-size="13">Linear Projection</text>

  <!-- Arrow to output -->
  <line x1="400" y1="481" x2="400" y2="507" stroke="#C9B896" stroke-width="1.5" marker-end="url(#mhaArrowGold)"/>

  <!-- Output -->
  <text x="400" y="525" text-anchor="middle" fill="#C9B896" font-size="13" font-weight="bold">Multi-Head Attention Output</text>

  <!-- Side annotation -->
  <text x="770" y="270" text-anchor="middle" fill="#8b949e" font-size="10" transform="rotate(90, 770, 270)">Each head learns a different relationship</text>
</svg>