<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="ui-sans-serif, system-ui, sans-serif" role="img" aria-label="The AppendEntries consistency check. The leader sends the index and term of the entry immediately preceding the new entries. If the follower's log does not contain a matching entry at that position, it rejects the request, and the leader decrements and retries until the logs converge.">
  <defs>
    <marker id="a3" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#d4a24e"/></marker>
    <marker id="rej" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#c98a8a"/></marker>
    <style>
      .cell{fill:#ffffff;stroke:#d1d5db;stroke-width:1.2;}
      .match{fill:#ecf6ef;stroke:#79b18c;stroke-width:1.4;}
      .new{fill:#fbf4e6;stroke:#d4a24e;stroke-width:1.4;}
      .bad{fill:#f7ecec;stroke:#c98a8a;stroke-width:1.4;}
      .t{fill:#1a1c22;}
      .m{fill:#6b7280;}
      .lbl{fill:#1a1c22;font-weight:700;}
      .flow{stroke:#d4a24e;stroke-width:1.8;fill:none;}
      .reject{stroke:#c98a8a;stroke-width:1.8;fill:none;}
      @media (prefers-color-scheme: dark){
        .cell{fill:#0f1116;stroke:#2a2d35;}
        .match{fill:#12251a;stroke:#2f6b47;}
        .new{fill:#221c10;stroke:#d4a24e;}
        .bad{fill:#2a1414;stroke:#7a3b3b;}
        .t{fill:#e8e8ea;}.m{fill:#9aa0aa;}.lbl{fill:#e8e8ea;}
      }
    </style>
  </defs>

  <text class="lbl" x="20" y="60" font-size="12">Leader</text>
  <g font-size="11" text-anchor="middle">
    <rect class="match" x="110" y="42" width="52" height="36" rx="4"/><text class="t" x="136" y="65">t2</text>
    <rect class="match" x="168" y="42" width="52" height="36" rx="4"/><text class="t" x="194" y="65">t2</text>
    <rect class="new" x="226" y="42" width="52" height="36" rx="4"/><text class="t" x="252" y="65">t3 new</text>
  </g>
  <text class="m" x="194" y="30" font-size="10" text-anchor="middle">prevLogIndex=2, prevLogTerm=2</text>

  <!-- send -->
  <path class="flow" d="M252 82 V120" marker-end="url(#a3)"/>
  <text class="m" x="300" y="105" font-size="10">AppendEntries</text>

  <!-- follower matching -->
  <text class="lbl" x="20" y="150" font-size="12">Follower ✓</text>
  <g font-size="11" text-anchor="middle">
    <rect class="match" x="110" y="132" width="52" height="36" rx="4"/><text class="t" x="136" y="155">t2</text>
    <rect class="match" x="168" y="132" width="52" height="36" rx="4"/><text class="t" x="194" y="155">t2</text>
  </g>
  <text class="m" x="300" y="155" font-size="10">index 2 has term 2 → match → append ✓</text>

  <!-- follower mismatch -->
  <text class="lbl" x="20" y="235" font-size="12">Follower ✗</text>
  <g font-size="11" text-anchor="middle">
    <rect class="match" x="110" y="217" width="52" height="36" rx="4"/><text class="t" x="136" y="240">t2</text>
    <rect class="bad" x="168" y="217" width="52" height="36" rx="4"/><text class="t" x="194" y="240">t1</text>
  </g>
  <text class="m" x="300" y="234" font-size="10">index 2 has term 1 ≠ 2 → reject</text>
  <path class="reject" d="M360 224 H430" marker-end="url(#rej)"/>
  <text class="m" x="470" y="228" font-size="10">leader decrements</text>
  <text class="m" x="470" y="242" font-size="10">nextIndex, retries</text>

  <text class="m" x="110" y="285" font-size="10">Induction: if the entry before the new ones matches, the whole prefix matches (Log Matching Property).</text>
</svg>
