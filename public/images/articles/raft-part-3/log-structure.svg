<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="ui-sans-serif, system-ui, sans-serif" role="img" aria-label="Raft log structure across a leader and two followers. Each entry stores a term number and a command. Entries committed on a majority are shaded. Follower 3 is missing the two most recent entries and will catch up via AppendEntries.">
  <defs>
    <style>
      .idx{fill:#6b7280;}
      .cell{fill:#ffffff;stroke:#d1d5db;stroke-width:1.2;}
      .committed{fill:#ecf6ef;stroke:#79b18c;stroke-width:1.4;}
      .t{fill:#1a1c22;}
      .m{fill:#6b7280;}
      .lbl{fill:#1a1c22;font-weight:700;}
      @media (prefers-color-scheme: dark){
        .cell{fill:#0f1116;stroke:#2a2d35;}
        .committed{fill:#12251a;stroke:#2f6b47;}
        .t{fill:#e8e8ea;}
        .m{fill:#9aa0aa;}
        .lbl{fill:#e8e8ea;}
        .idx{fill:#9aa0aa;}
      }
    </style>
  </defs>

  <!-- index header -->
  <text class="idx" x="150" y="34" font-size="11" text-anchor="middle">1</text>
  <text class="idx" x="220" y="34" font-size="11" text-anchor="middle">2</text>
  <text class="idx" x="290" y="34" font-size="11" text-anchor="middle">3</text>
  <text class="idx" x="360" y="34" font-size="11" text-anchor="middle">4</text>
  <text class="idx" x="430" y="34" font-size="11" text-anchor="middle">5</text>
  <text class="idx" x="500" y="34" font-size="11" text-anchor="middle">6</text>
  <text class="m" x="500" y="20" font-size="10" text-anchor="middle">log index</text>

  <!-- LEADER -->
  <text class="lbl" x="20" y="72" font-size="12">Leader</text>
  <g font-size="12" text-anchor="middle">
    <rect class="committed" x="120" y="55" width="60" height="40" rx="4"/><text class="t" x="150" y="72">1·x=3</text>
    <rect class="committed" x="190" y="55" width="60" height="40" rx="4"/><text class="t" x="220" y="72">1·y=1</text>
    <rect class="committed" x="260" y="55" width="60" height="40" rx="4"/><text class="t" x="290" y="72">1·z=0</text>
    <rect class="committed" x="330" y="55" width="60" height="40" rx="4"/><text class="t" x="360" y="72">2·x=1</text>
    <rect class="cell" x="400" y="55" width="60" height="40" rx="4"/><text class="t" x="430" y="72">3·y=9</text>
    <rect class="cell" x="470" y="55" width="60" height="40" rx="4"/><text class="t" x="500" y="72">3·x=2</text>
  </g>

  <!-- FOLLOWER 2 -->
  <text class="lbl" x="20" y="142" font-size="12">Follower 2</text>
  <g font-size="12" text-anchor="middle">
    <rect class="committed" x="120" y="125" width="60" height="40" rx="4"/><text class="t" x="150" y="142">1·x=3</text>
    <rect class="committed" x="190" y="125" width="60" height="40" rx="4"/><text class="t" x="220" y="142">1·y=1</text>
    <rect class="committed" x="260" y="125" width="60" height="40" rx="4"/><text class="t" x="290" y="142">1·z=0</text>
    <rect class="committed" x="330" y="125" width="60" height="40" rx="4"/><text class="t" x="360" y="142">2·x=1</text>
    <rect class="cell" x="400" y="125" width="60" height="40" rx="4"/><text class="t" x="430" y="142">3·y=9</text>
  </g>

  <!-- FOLLOWER 3 -->
  <text class="lbl" x="20" y="212" font-size="12">Follower 3</text>
  <g font-size="12" text-anchor="middle">
    <rect class="committed" x="120" y="195" width="60" height="40" rx="4"/><text class="t" x="150" y="212">1·x=3</text>
    <rect class="committed" x="190" y="195" width="60" height="40" rx="4"/><text class="t" x="220" y="212">1·y=1</text>
    <rect class="committed" x="260" y="195" width="60" height="40" rx="4"/><text class="t" x="290" y="212">1·z=0</text>
    <rect class="committed" x="330" y="195" width="60" height="40" rx="4"/><text class="t" x="360" y="212">2·x=1</text>
    <rect x="400" y="195" width="130" height="40" rx="4" fill="none" stroke="#c98a8a" stroke-dasharray="4 3"/>
    <text class="m" x="465" y="212" font-size="10">missing — will catch up</text>
  </g>

  <!-- entry legend -->
  <text class="m" x="120" y="262" font-size="10">Each cell = term · command</text>
  <rect class="committed" x="300" y="252" width="14" height="14" rx="2"/>
  <text class="m" x="320" y="263" font-size="11">committed (stored on a majority — safe to apply)</text>
</svg>
